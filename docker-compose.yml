services:
  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4j_data:/data
    # 不对公网暴露 7687/7474，仅容器内网访问；如需 Neo4j 浏览器可临时映射 7474
    restart: always

  backend:
    build: .
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_TEXT_MODEL=${QWEN_TEXT_MODEL:-qwen-plus}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - DB_PATH=/app/data/yyxz_sqlite.db
      - UPLOAD_DIR=/app/data/uploads
    volumes:
      - app_data:/app/data
    depends_on:
      - neo4j
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443"   # 配好 TLS 证书后启用
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always

volumes:
  neo4j_data:
  app_data:
